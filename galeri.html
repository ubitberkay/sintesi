<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sintesi | Galeri</title>
    <link rel="icon" type="image/webp" href="sintesi.webp">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --color-bg: #0c0c0c;
            --color-surface: #151515;
            --color-text: #f5f5f5;
            --color-text-muted: #a0a0a0;
            --color-accent: #9D432C;
            --color-accent-hover: #e8c682;
            --font-heading: 'Cormorant Garamond', serif;
            --font-body: 'Montserrat', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: var(--font-heading);
            font-weight: 400;
        }

        h2 {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--color-accent);
        }

        .section-subtitle {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--color-text-muted);
            margin-bottom: 2rem;
            display: block;
        }

        p {
            font-size: 1rem;
            font-weight: 300;
            color: var(--color-text-muted);
            margin-bottom: 1.5rem;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: color 0.3s ease;
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            transition: background-color 0.4s ease, padding 0.4s ease;
            background-color: rgba(12, 12, 12, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 600;
            color: var(--color-text);
            letter-spacing: 4px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo img {
            height: 1.2em;
            width: auto;
            object-fit: contain;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 3rem;
        }

        nav ul li a {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 1px;
            background-color: var(--color-accent);
            transition: width 0.3s ease;
        }

        nav ul li a:hover::after,
        nav ul li a.active::after {
            width: 100%;
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
        }

        .menu-toggle span {
            width: 30px;
            height: 1px;
            background-color: var(--color-text);
            transition: 0.3s;
        }

        section {
            padding: 8rem 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        #galeri {
            text-align: center;
            padding-top: 12rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 4rem;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            aspect-ratio: 1/1;
            cursor: pointer;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.7s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }

        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.8rem;
            color: var(--color-text-muted);
            letter-spacing: 1px;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 2000;
            padding-top: 50px;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
        }

        .lightbox-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 75vh;
            object-fit: contain;
            animation: zoomIn 0.3s ease;
        }

        .lightbox-thumbnails {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            max-width: 90%;
            overflow-x: auto;
            padding: 10px;
            z-index: 2002;
        }

        .lightbox-thumbnails img {
            height: 60px;
            width: 60px;
            object-fit: cover;
            cursor: pointer;
            opacity: 0.5;
            transition: 0.3s;
            border-radius: 4px;
            border: 2px solid transparent;
        }

        .lightbox-thumbnails img:hover {
            opacity: 0.8;
        }

        .lightbox-thumbnails img.active {
            opacity: 1;
            border-color: var(--color-accent);
        }

        .lightbox-thumbnails::-webkit-scrollbar {
            height: 6px;
        }

        .lightbox-thumbnails::-webkit-scrollbar-thumb {
            background: rgba(157, 67, 44, 0.5);
            border-radius: 3px;
        }

        @keyframes zoomIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .close-btn {
            position: absolute;
            top: 30px;
            right: 40px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            z-index: 2001;
        }

        .close-btn:hover,
        .close-btn:focus {
            color: var(--color-accent);
            text-decoration: none;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            font-size: 30px;
            padding: 15px 20px;
            cursor: pointer;
            transition: background 0.3s;
            z-index: 2001;
        }

        .nav-btn:hover {
            background: var(--color-accent);
        }

        .prev-btn {
            left: 20px;
        }

        .next-btn {
            right: 20px;
        }

        .lang-switcher {
            display: flex;
            gap: 10px;
            margin-left: 2rem;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding-left: 1.5rem;
        }

        .lang-btn {
            cursor: pointer;
            font-size: 0.75rem;
            color: var(--color-text-muted);
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .lang-btn:hover,
        .lang-btn.active {
            color: var(--color-accent);
        }

        @media (max-width: 1100px) {
            .lang-switcher {
                margin-left: 0;
                margin-top: 2rem;
                border-left: none;
                padding-left: 0;
            }
            nav ul {
                position: fixed;
                top: 0;
                right: -100%;
                width: 70%;
                height: 100vh;
                background-color: var(--color-surface);
                flex-direction: column;
                justify-content: center;
                align-items: center;
                transition: right 0.4s ease;
            }

            nav ul.active {
                right: 0;
            }

            .menu-toggle {
                display: flex;
                z-index: 1001;
            }

            .menu-toggle.active span:nth-child(1) {
                transform: translateY(7px) rotate(45deg);
            }

            .menu-toggle.active span:nth-child(2) {
                opacity: 0;
            }

            .menu-toggle.active span:nth-child(3) {
                transform: translateY(-7px) rotate(-45deg);
            }
        }
    </style>
</head>

<body>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <span class="close-btn">&times;</span>
        <button class="nav-btn prev-btn">&#10094;</button>
        <img class="lightbox-content" id="lightbox-img">
        <button class="nav-btn next-btn">&#10095;</button>
        <div id="lightbox-thumbnails" class="lightbox-thumbnails"></div>
    </div>

    <script>
        const mobileMenu = document.getElementById('mobile-menu');
        const navLinks = document.getElementById('nav-links');
        mobileMenu.addEventListener('click', () => {
            mobileMenu.classList.toggle('active');
            navLinks.classList.toggle('active');
        });

        // Resize kontrolü: Pencere büyütülürse mobil menüyü temizle
        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                mobileMenu.classList.remove('active');
                navLinks.classList.remove('active');
            }

        });

        // Lightbox functionality
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.querySelector('.close-btn');
        const prevBtn = document.querySelector('.prev-btn');
        const nextBtn = document.querySelector('.next-btn');

        const galleryImages = Array.from(document.querySelectorAll('.gallery-item img'));
        let currentIndex = 0;

        const lightboxThumbnails = document.getElementById('lightbox-thumbnails');

        if (lightboxThumbnails) {
            galleryImages.forEach((img, index) => {
                const thumb = document.createElement('img');
                thumb.src = img.src;
                thumb.addEventListener('click', () => {
                    openLightbox(index);
                });
                lightboxThumbnails.appendChild(thumb);
            });
        }

        function updateThumbnails() {
            if (!lightboxThumbnails) return;
            const thumbs = lightboxThumbnails.querySelectorAll('img');
            thumbs.forEach((t, i) => {
                if (i === currentIndex) {
                    t.classList.add('active');
                    t.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                } else {
                    t.classList.remove('active');
                }
            });
        }

        function openLightbox(index) {
            currentIndex = index;
            lightboxImg.src = galleryImages[currentIndex].src;
            lightbox.style.display = 'block';
            updateThumbnails();
        }

        function closeLightbox() {
            lightbox.style.display = 'none';
        }

        function showNext() {
            currentIndex = (currentIndex + 1) % galleryImages.length;
            lightboxImg.src = galleryImages[currentIndex].src;
            updateThumbnails();
        }

        function showPrev() {
            currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
            lightboxImg.src = galleryImages[currentIndex].src;
            updateThumbnails();
        }

        galleryImages.forEach((img, index) => {
            img.parentElement.addEventListener('click', () => {
                openLightbox(index);
            });
        });

        closeBtn.addEventListener('click', closeLightbox);
        nextBtn.addEventListener('click', showNext);
        prevBtn.addEventListener('click', showPrev);

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                closeLightbox();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (lightbox.style.display === 'block') {
                if (e.key === 'Escape') closeLightbox();
                if (e.key === 'ArrowRight') showNext();
                if (e.key === 'ArrowLeft') showPrev();
            }
        });
    </script>
